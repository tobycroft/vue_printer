<h2><font color="#009999">演示打印公章效果图：</font></h2>
<p>&nbsp;&nbsp;&nbsp; 通常用浏览器打印公章都是把图片z-index设为负值来实现，本质是公章变为背景图，</p>    
<p>但进入<a href="javascript:myPreview1()">打印预览</a>看看，Lodop对右图通过增设transcolor属性实现了“先字后章”效果。</p>
<p>结合样例25，带水印的公章文件效果，进入<a href="javascript:myPreview2()">打印预览2</a></p>

<p>注意要实现右边的“后盖章”效果,需要图片透色部分要纯正(整白),最好是PNG格式。</p>

<p><a href="https://www.lodop.net/LodopDemo.html">&lt;&lt;回样例目录</a></p>

<script language="javascript" type="text/javascript"> 
	var LODOP; //声明为全局变量 
	function myPreview1() {		
		LODOP=getLodop(); 		
		LODOP.PRINT_INIT("打印插件功能演示_Lodop功能_打印公章");	
	 	LODOP.ADD_PRINT_HTM(0,0,"100%","100%",document.documentElement.innerHTML);
		LODOP.PREVIEW();	
	};		
	function myPreview2() {		
		LODOP=getLodop(); 		
		LODOP.PRINT_INIT("打印插件功能演示_Lodop功能_打印公章加水印效果");	
		//水印效果begin----
		LODOP.ADD_PRINT_TEXT(13,22,295,160,"秘密文件");
		LODOP.SET_PRINT_STYLEA(0,"FontSize",20);
		LODOP.SET_PRINT_STYLEA(0,"FontColor","#EEC591");
		LODOP.SET_PRINT_STYLEA(0,"ItemType",1);
		LODOP.SET_PRINT_STYLEA(0,"Angle",50);
		LODOP.SET_PRINT_STYLEA(0,"Repeat",true);
		//水印效果end-----
		LODOP.ADD_PRINT_HTM(0, 0, "100%", "100%", "URL:PrintSample37.html");
		LODOP.PREVIEW();	
	};				
</script>
