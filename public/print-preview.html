<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>打印预览</title>
    <style>
        body { margin: 20px; font-family: Arial, sans-serif; }
        #status { padding: 10px; border-radius: 4px; margin-bottom: 10px; }
        #status.loading { background-color: #e8f4fd; color: #1e88e5; }
        #status.success { background-color: #e8f5e9; color: #43a047; }
        #status.error { background-color: #ffebee; color: #e53935; }
        button { padding: 10px 20px; font-size: 14px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="status" class="loading">加载打印控件...</div>
    <button id="previewBtn" style="display: none;">开始预览</button>

    <script>
        var LODOP;
        var printTemplate = null;
        var printerUrl = 'http://localhost:8000';

        function loadCLodopScript(url) {
            return new Promise((resolve, reject) => {
                var script = document.createElement('script');
                script.src = url + '/CLodopfuncs.js';
                script.onload = () => resolve();
                script.onerror = () => reject(new Error('加载CLodop脚本失败'));
                document.head.appendChild(script);
            });
        }

        function preview() {
            try {
                LODOP = getLodop();
                if (!LODOP) {
                    alert('打印控件未加载，请确保C-LODOP服务已启动');
                    return;
                }
                
                if (!printTemplate) {
                    alert('没有打印数据');
                    return;
                }
                
                LODOP.PRINT_INIT(printTemplate.name || '打印模板预览');
                LODOP.SET_PRINT_PAGESIZE(0, printTemplate.paperWidth, printTemplate.paperHeight, '自定义纸张');
                
                if (printTemplate.controls) {
                    printTemplate.controls.forEach(function(control) {
                        if (control.type === 'text') {
                            LODOP.ADD_PRINT_TEXT(control.y, control.x, control.width, control.height, control.text || '');
                            LODOP.SET_PRINT_STYLEA(0, 'FontSize', control.fontSize);
                            LODOP.SET_PRINT_STYLEA(0, 'Bold', control.fontWeight === 'bold' ? 1 : 0);
                            var align = control.align === 'center' ? 2 : (control.align === 'right' ? 3 : 1);
                            LODOP.SET_PRINT_STYLEA(0, 'Alignment', align);
                        } else if (control.type === 'rect') {
                            LODOP.ADD_PRINT_RECT(control.y, control.x, control.width, control.height, 0, control.borderWidth || 1);
                        } else if (control.type === 'line') {
                            LODOP.ADD_PRINT_LINE(control.y, control.x, control.y, control.x + control.width, control.borderWidth || 1);
                        }
                    });
                }
                
                LODOP.PREVIEW();
            } catch(e) {
                console.error('预览出错:', e);
                alert('预览出错: ' + e.message);
            }
        }

        document.addEventListener('DOMContentLoaded', async function() {
            var params = new URLSearchParams(window.location.search);
            var configStr = params.get('config');
            var templateStr = params.get('template');
            
            if (configStr) {
                try {
                    var config = JSON.parse(decodeURIComponent(configStr));
                    if (config.url) {
                        printerUrl = config.url;
                    }
                } catch(e) {
                    console.error('解析配置失败:', e);
                }
            }
            
            if (templateStr) {
                try {
                    printTemplate = JSON.parse(decodeURIComponent(templateStr));
                } catch(e) {
                    console.error('解析模板失败:', e);
                }
            }
            
            var statusDiv = document.getElementById('status');
            var previewBtn = document.getElementById('previewBtn');
            
            try {
                await loadCLodopScript(printerUrl);
                
                var checkLoaded = setInterval(function() {
                    if (typeof window.getCLodop !== 'undefined') {
                        clearInterval(checkLoaded);
                        
                        statusDiv.className = 'success';
                        statusDiv.textContent = '打印控件加载成功';
                        previewBtn.style.display = 'block';
                        previewBtn.onclick = preview;
                        
                        if (printTemplate) {
                            preview();
                        }
                    }
                }, 200);
                
                setTimeout(function() {
                    clearInterval(checkLoaded);
                    if (typeof window.getCLodop === 'undefined') {
                        statusDiv.className = 'error';
                        statusDiv.textContent = '打印控件加载失败，请确保C-LODOP服务已启动';
                    }
                }, 10000);
                
            } catch(e) {
                statusDiv.className = 'error';
                statusDiv.textContent = '加载CLodop脚本失败: ' + e.message;
            }
        });
    </script>
</body>
</html>
