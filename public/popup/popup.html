<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vue Printer</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 280px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: #f5f5f5;
    }

    .header {
      background: linear-gradient(135deg, #4CAF50 0%, #45a049 100%);
      color: white;
      padding: 20px;
      text-align: center;
    }

    .header h1 {
      font-size: 18px;
      margin-bottom: 5px;
    }

    .header p {
      font-size: 12px;
      opacity: 0.9;
    }

    .status-container {
      padding: 20px;
      background: white;
      margin: 15px;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .status-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 0;
      border-bottom: 1px solid #f0f0f0;
    }

    .status-item:last-child {
      border-bottom: none;
    }

    .status-icon {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .status-icon.connected {
      background: #4CAF50;
      box-shadow: 0 0 8px rgba(76, 175, 80, 0.5);
    }

    .status-icon.disconnected {
      background: #f44336;
    }

    .status-icon.checking {
      background: #ff9800;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .status-info {
      flex: 1;
    }

    .status-label {
      font-size: 13px;
      font-weight: 500;
      color: #333;
    }

    .status-desc {
      font-size: 11px;
      color: #999;
      margin-top: 2px;
    }

    .actions {
      padding: 0 15px 15px;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 12px;
      background: #4CAF50;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      text-align: center;
      text-decoration: none;
      transition: background 0.2s;
      margin-bottom: 10px;
    }

    .btn:hover {
      background: #45a049;
    }

    .btn-secondary {
      background: white;
      color: #666;
      border: 1px solid #ddd;
    }

    .btn-secondary:hover {
      background: #f5f5f5;
    }

    .btn-logout {
      background: transparent;
      color: #f44336;
      border: 1px solid #f44336;
      font-size: 12px;
      padding: 8px;
    }

    .btn-logout:hover {
      background: #ffebee;
    }

    .footer {
      padding: 10px 15px 15px;
      text-align: center;
    }

    .footer-text {
      font-size: 11px;
      color: #999;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>🖨️ Vue Printer</h1>
    <p>C-LODOP 打印服务</p>
  </div>

  <div class="status-container">
    <div class="status-item">
      <div class="status-icon connected" id="server-status"></div>
      <div class="status-info">
        <div class="status-label">服务器连接</div>
        <div class="status-desc" id="server-status-text">已连接</div>
      </div>
    </div>
    <div class="status-item">
      <div class="status-icon connected" id="printer-status"></div>
      <div class="status-info">
        <div class="status-label">打印服务</div>
        <div class="status-desc" id="printer-status-text">运行正常</div>
      </div>
    </div>
    <div class="status-item">
      <div class="status-icon connected" id="user-status"></div>
      <div class="status-info">
        <div class="status-label">用户状态</div>
        <div class="status-desc" id="user-status-text">已登录</div>
      </div>
    </div>
  </div>

  <div class="actions">
    <button class="btn" id="btn-settings">打开设置</button>
    <button class="btn btn-secondary" id="btn-logout">退出登录</button>
  </div>

  <div class="footer">
    <p class="footer-text">Vue Printer v1.0.0</p>
  </div>

  <script src="popup.js"></script>
</body>
</html>
