<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vue Printer - 登录</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 350px;
      min-height: 400px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: #f5f5f5;
    }

    .auth-container {
      padding: 20px;
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    .auth-header {
      text-align: center;
      margin-bottom: 30px;
      padding: 20px 0;
    }

    .auth-header h1 {
      font-size: 24px;
      color: #333;
      margin-bottom: 8px;
    }

    .auth-header p {
      font-size: 13px;
      color: #666;
    }

    .auth-form {
      flex: 1;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      color: #333;
      font-weight: 500;
      font-size: 14px;
    }

    .form-group input {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      font-size: 14px;
      transition: border-color 0.3s;
      box-sizing: border-box;
    }

    .form-group input:focus {
      outline: none;
      border-color: #4CAF50;
      box-shadow: 0 0 0 3px rgba(76, 175, 80, 0.1);
    }

    .captcha-group {
      display: flex;
      gap: 10px;
    }

    .captcha-group input {
      flex: 1;
    }

    .captcha-btn {
      width: 120px;
      padding: 0;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      background: #f5f5f5;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .captcha-btn img {
      width: 100%;
      height: 42px;
      object-fit: cover;
      border-radius: 6px;
    }

    .form-actions {
      margin-top: 30px;
    }

    .btn-primary {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #4CAF50 0%, #45a049 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.3s;
    }

    .btn-primary:hover:not(:disabled) {
      opacity: 0.9;
    }

    .btn-primary:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .auth-switch {
      text-align: center;
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid #eee;
    }

    .auth-switch p {
      margin: 0;
      color: #666;
      font-size: 13px;
    }

    .link-btn {
      background: none;
      border: none;
      color: #4CAF50;
      font-weight: 600;
      cursor: pointer;
      font-size: inherit;
      text-decoration: underline;
    }

    .link-btn:hover {
      color: #45a049;
    }

    .error-message {
      background: #ffebee;
      color: #c62828;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 13px;
      display: none;
    }

    .success-message {
      background: #e8f5e9;
      color: #2e7d32;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 13px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="auth-container">
    <div class="auth-header">
      <h1>🖨️ Vue Printer</h1>
      <p id="auth-subtitle">欢迎登录您的账户</p>
    </div>

    <div class="error-message" id="error-message"></div>
    <div class="success-message" id="success-message"></div>

    <form class="auth-form" id="auth-form">
      <div class="form-group">
        <label for="username">用户名</label>
        <input
          id="username"
          type="text"
          placeholder="请输入用户名"
          required
        />
      </div>
      
      <div class="form-group">
        <label for="password">密码</label>
        <input
          id="password"
          type="password"
          placeholder="请输入密码"
          required
        />
      </div>
      
      <div class="form-group" id="confirm-password-group" style="display: none;">
        <label for="confirm-password">确认密码</label>
        <input
          id="confirm-password"
          type="password"
          placeholder="请再次输入密码"
          required
        />
      </div>
      
      <div class="form-group">
        <label for="captcha">验证码</label>
        <div class="captcha-group">
          <input
            id="captcha"
            type="text"
            placeholder="请输入验证码"
            required
          />
          <button type="button" class="captcha-btn" id="btn-refresh-captcha">
            <img id="captcha-img" src="" alt="验证码" />
          </button>
        </div>
      </div>
      
      <div class="form-actions">
        <button type="submit" class="btn-primary" id="auth-submit">
          登录
        </button>
      </div>
    </form>
    
    <div class="auth-switch">
      <p id="switch-text">
        还没有账户？
        <button type="button" class="link-btn" id="btn-toggle-mode">
          立即注册
        </button>
      </p>
    </div>
  </div>

  <script src="auth.js"></script>
</body>
</html>
